
[[session]]
name = "Downloads"
path = "~/Downloads"
startup_command = "ll"
preview = "ll"

[[session]]
name = "Main"
path = "~"

[[session]]
name = "tmux config"
path = "~/.config/dot-files"
startup_command = "nvim ~/.config/dot-files/packages/tmux/.config/tmux/tmux.conf"
preview_command = "bat --color=always ~/.config/dot-files/packages/tmux/.config/tmux/tmux.conf"

[[session]]
name = "nvim config"
path = "~/.config/nvim"
startup_command = "nvim ~/.config/nvim"

[[session]]
name = "sesh config"
path = "~/.config/sesh"
startup_command = "nvim ~/.config/sesh/sesh.toml"

[[session]]
name = "zsh config"
path = "~/.config/dot-files"
startup_command = "nvim ~/.config/dot-files/packages/zsh/.zshrc"
preview_command = "bat --color=always ~/.zshrc"

[[session]]
name = "ideavimrc config"
path = "~/.config/dotfiles"
startup_command = "nvim ~/.config/dot-files/packages/ideavim/.ideavimrc"
preview_command = "bat --color=always ~/.config/dot-files/packages/ideavim/.ideavimrc"

