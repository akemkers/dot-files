# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule = float on, match:class ^(waypaper)$

windowrule = float on, match:class ^(yazi-float)$
windowrule = center on, match:class ^(yazi-float)$
windowrule = size 1000 700, match:class ^(yazi-float)$

windowrule = float on, match:class ^(zephyrusctl-float)$
windowrule = center on, match:class ^(zephyrusctl-float)$
windowrule = size 1000 700, match:class ^(zephyrusctl-float)$

# Files (file manager) floating configuration
windowrule = float on, match:class ^(org.gnome.Nautilus)$
windowrule = center on, match:class ^(org.gnome.Nautilus)$
windowrule = size 1000 700, match:class ^(org.gnome.Nautilus)$

# Blueberry (Bluetooth manager) floating configuration
windowrule = float on, match:class ^(blueberry.py)$
windowrule = center on, match:class ^(blueberry.py)$
windowrule = size 800 600, match:class ^(blueberry.py)$

# PulseAudio Volume Control floating configuration
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = center on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 800 600, match:class ^(org.pulseaudio.pavucontrol)$

# GNOME Calculator floating configuration
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = center on, match:class ^(org.gnome.Calculator)$
windowrule = size 400 500, match:class ^(org.gnome.Calculator)$

# Ignore maximize requests from apps.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
