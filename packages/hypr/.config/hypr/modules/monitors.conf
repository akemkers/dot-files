
# External monitor (left of internal)
# monitor=HDMI-A-1, 2560x1440@144, -2560x0, 1
#monitor=eDP-1, 2560x1600@240, 0x0, 1.6
monitor=eDP-1, 2560x1600@60, 0x0, 1.6

# Generic fallback for any additional monitors
monitor=,2560x1440@144,auto,1

# Should remove blurryness
xwayland {
  force_zero_scaling = true
}

