
# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = no
    kb_variant =
    kb_model =
	#kb_options = caps:escape

    follow_mouse = 1

    sensitivity = -0.1 # -1.0 - 1.0, 0 means no modification.

    repeat_rate = 25
    repeat_delay = 200

    touchpad {
        natural_scroll = true
	scroll_factor = 0.1
	clickfinger_behavior = true
    }
}
